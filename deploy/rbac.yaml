apiVersion: v1
kind: ServiceAccount
metadata:
  name: hashrouter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hashrouter-service-registry
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hashrouter-service-registry
subjects:
  - kind: ServiceAccount
    name: hashrouter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hashrouter-service-registry
