apiVersion: apps/v1
kind: Deployment
metadata:
  name: hashrouter
  labels:
    app.kubernetes.io/name: hashrouter
spec:
  replicas: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: hashrouter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hashrouter
    spec:
      serviceAccountName: hashrouter
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: hashrouter
                topologyKey: kubernetes.io/hostname
      containers:
        - name: hashrouter
          image: hashrouter:v0.0.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: hashrouter
